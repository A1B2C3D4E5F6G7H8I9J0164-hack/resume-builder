services:
  # Backend
  - type: web
    name: resume-builder-backend
    env: node
    root: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # Frontend
  - type: web
    name: resume-builder-frontend
    env: node
    root: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT
        sync: false
